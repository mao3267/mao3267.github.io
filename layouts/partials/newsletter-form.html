{{- $variant := .variant | default "inline" -}}
{{- $username := site.Params.newsletter.buttondownUsername -}}
{{- if $username -}}
<form
  action="https://buttondown.com/api/emails/embed-subscribe/{{ $username }}"
  method="post"
  target="_blank"
  class="{{ if eq $variant "stacked" }}space-y-3{{ else }}flex flex-col sm:flex-row gap-3{{ end }}"
>
  <input
    type="email"
    name="email"
    placeholder="your@email.com"
    required
    class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/30 transition-colors"
  />
  <button
    type="submit"
    class="gradient-primary text-white text-sm font-semibold px-6 py-2.5 rounded-lg hover:opacity-90 transition-opacity whitespace-nowrap"
  >
    Subscribe
  </button>
</form>
{{- end -}}
