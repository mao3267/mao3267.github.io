<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0b1326"/>

<title>{{ i18n "head_title" }}</title>
<meta name="description" content='{{ i18n "head_description" }}'>

<!-- Google Fonts: Space Grotesk + Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        /* M3 Surface hierarchy */
        surface: {
          DEFAULT: '#0b1326',
          dim: '#0b1326',
          bright: '#31394d',
          container: {
            DEFAULT: '#171f33',
            lowest: '#060e20',
            low: '#131b2e',
            high: '#222a3d',
            highest: '#2d3449',
          },
          variant: '#2d3449',
          tint: '#ccbeff',
        },
        /* Shorthand aliases for existing templates */
        'surface-low': '#131b2e',
        'surface-mid': '#171f33',
        'surface-high': '#222a3d',
        /* M3 Primary */
        primary: {
          DEFAULT: '#ccbeff',
          light: '#ccbeff',
          dark: '#5a3db8',
          container: '#7858e5',
          fixed: '#e7deff',
          'fixed-dim': '#ccbeff',
        },
        'on-primary': '#350097',
        'on-primary-container': '#fbf5ff',
        /* M3 Secondary */
        secondary: {
          DEFAULT: '#97d2c9',
          light: '#b3eee5',
          container: '#13524c',
          fixed: '#b3eee5',
          'fixed-dim': '#97d2c9',
        },
        'on-secondary': '#003733',
        'on-secondary-container': '#89c3bb',
        /* M3 Tertiary */
        tertiary: {
          DEFAULT: '#b9c8de',
          container: '#647386',
          fixed: '#d4e4fa',
          'fixed-dim': '#b9c8de',
        },
        /* M3 Error */
        error: {
          DEFAULT: '#ffb4ab',
          container: '#93000a',
        },
        /* M3 Semantic surface colors */
        background: '#0b1326',
        'on-background': '#dae2fd',
        'on-surface': '#dae2fd',
        'on-surface-variant': '#cac4d6',
        outline: '#938ea0',
        'outline-variant': '#484554',
        /* M3 Inverse */
        'inverse-surface': '#dae2fd',
        'inverse-on-surface': '#283044',
        'inverse-primary': '#6442d0',
        /* Accent shortcuts */
        accent: {
          violet: '#7858e5',
          teal: '#97d2c9',
        },
      },
      fontFamily: {
        display: ['"Space Grotesk"', 'sans-serif'],
        body: ['"Inter"', 'sans-serif'],
      },
    },
  },
}
</script>

<!-- Tailwind Typography Plugin -->
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>

{{- /* architect.css for glass effects, gradients, animations */ -}}
{{ $architect := resources.Get "css/architect.css" }}
{{ if $architect }}
  {{ if hugo.IsProduction }}
    {{ $architect = $architect | minify | fingerprint }}
  {{ end }}
  <link rel="stylesheet" href="{{ $architect.RelPermalink }}">
{{ end }}

{{ template "_internal/opengraph.html" . }}
