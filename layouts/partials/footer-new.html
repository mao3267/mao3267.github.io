<footer class="bg-slate-900/80 border-t border-white/5 py-8 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">

    <!-- Brand + copyright -->
    <div class="flex items-center gap-3">
      <a href="{{ .Site.BaseURL | relLangURL }}" class="font-display text-sm font-bold tracking-tight">
        <span class="text-primary-light">{{ i18n "logo_text1" }}</span><span class="text-slate-500">{{ i18n "logo_text2" }}</span>
      </a>
      <span class="text-slate-600 text-xs">|</span>
      <span class="text-slate-500 text-xs">{{ i18n "footer_notice" }}</span>
    </div>

    <!-- Social links -->
    <div class="flex items-center gap-3">
      {{ range .Site.Data.homepage.showcase.socialLinks }}
      <a href="{{ .URL }}" target="_blank" rel="noopener noreferrer"
         class="text-slate-500 hover:text-primary-light transition-colors text-sm">
        {{ .label }}
      </a>
      {{ end }}
    </div>

  </div>
</footer>
