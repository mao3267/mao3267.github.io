<article class="bento-card p-6">
  <div class="flex flex-col">
    <div class="flex items-center gap-3 mb-2">
      <span class="text-xs text-slate-500">{{ .Date.Format "Jan 2, 2006" }}</span>
      <span class="text-xs text-slate-500">· {{ .WordCount }} words</span>
    </div>
    <h3 class="font-display text-lg font-semibold text-slate-100 mb-2">
      <a href="{{ .RelPermalink }}" class="hover:text-primary-light transition-colors">{{ .Title }}</a>
    </h3>
    <p class="text-sm text-slate-400 leading-relaxed mb-3">{{ .Summary | plainify | truncate 160 }}</p>
    <a href="{{ .RelPermalink }}" class="inline-flex items-center gap-1 text-sm font-medium text-primary-light hover:text-white transition-colors">
      Read more
      <span class="material-symbols-outlined text-sm">arrow_forward</span>
    </a>
  </div>
</article>
