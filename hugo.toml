baseURL = "https://mao3267.github.io/"
languageCode = "en"
theme = "adritian-free-hugo-theme"

[params]

  title = 'Mao.zip — Vincent Chen'
  description = 'Personal portfolio and blog of Vincent Chen, a CS graduate student at UC San Diego focused on NLP, LLMs, and open-source contributions.'
  images = ['/img/og-img.png']

  # Sections are no longer dynamically looped — index.html uses explicit partials
  sections = []

  homepageExperienceCount = 6

  [params.analytics]
  vercelPageInsights = false
  vercelAnalytics = false

  [params.analytics.googleAnalytics]
      code = "UA-XXXXX-Y"
      enabled = false
  [params.analytics.googleTagManager]
      code = "GTM-XXXXX"
      enabled = false

[build]
  [build.buildStats]
    disableClasses = false
    disableIDs = false
    disableTags = false
    enable = true

[params.languages.selector.disable]
  footer = true

[languages]
  [languages.en]
    disabled = false
    languageCode = 'en'
    languageDirection = 'ltr'
    languageName = 'English'
    title = ''
    weight = 0

    [languages.en.menus]
      [[languages.en.menus.header]]
        name = 'Home'
        URL = '/'
        weight = 1
      [[languages.en.menus.header]]
        name = 'About'
        URL = '#about'
        weight = 2
      [[languages.en.menus.header]]
        name = 'Projects'
        URL = '#portfolio'
        weight = 3
      [[languages.en.menus.header]]
        name = "Blog"
        URL = "/blog"
        weight = 5
      [[languages.en.menus.header]]
        name = "Contact"
        URL = "#contact"
        weight = 6

      [[languages.en.menus.footer]]
        name = "About"
        URL = "#about"
        weight = 2
      [[languages.en.menus.footer]]
        name = "Projects"
        URL = "#portfolio"
        weight = 3
      [[languages.en.menus.footer]]
        name = "Contact"
        URL = "#contact"
        weight = 4

  [languages.es]
    disabled = true
    languageCode = 'es'
    languageDirection = 'ltr'
    languageName = 'Español'
    title = ''
    weight = 0

  [languages.fr]
    disabled = true
    languageCode = 'fr'
    languageDirection = 'ltr'
    languageName = 'Français'
    title = ''
    weight = 0

# Force dark theme — no auto selection, no selector
[params.newsletter]
  buttondownUsername = "chenvincent610"

[params.colorTheme]
  [params.colorTheme.auto]
    disable = true
  [params.colorTheme.forced]
    theme = "dark"
  [params.colorTheme.selector.disable]
    footer = true
